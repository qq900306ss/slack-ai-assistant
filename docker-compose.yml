services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slack_assistant
    ports:
      - "15432:5432"  # Use 15432 externally to avoid conflict
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://postgres:postgres@postgres:5432/slack_assistant?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/slack_assistant?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
